[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "msi"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
archive-format = "tar.gz"
# Whether to run otherwise-parallelizable tasks on the same machine
merge-tasks = true
# Custom message to display on successful install
install-success-msg = "yammm is installed! Run 'yammm --help' to get started."
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether dist should create a Github Release or use an existing draft
create-release = true
# Skip checking whether the specified configuration files are up to date
allow-dirty = ["ci"]
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "AmphibianNetwork/homebrew-tap"
# Whether to install an updater program
install-updater = false

[dist.dependencies.apt]
libx11-dev = { stage = ["build", "run"] }
libwayland-dev = { stage = ["build", "run"] }
libxkbcommon-dev = { stage = ["build", "run"] }

[dist.homebrew]
tap = "AmphibianNetwork/homebrew-tap"

[dist.msi]
upgrade-code = "E9C1B8D0-3A7F-4D2E-B5C6-8F0A1E2D3B4C"
