on: [push, pull_request]

name: CI

jobs:
  check:
    name: Rust project (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Format + clippy only need to run on one OS — they're platform-agnostic
      # and re-running them on three runners burns minutes for nothing.
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run cargo check
        run: cargo check

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration_tests -- --test-threads=1

      - name: Run doc tests
        run: cargo test --doc

  network-tests:
    name: Network-dependent tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run ignored (network) tests
        run: cargo test --test integration_tests -- --ignored --test-threads=1

  security-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep in sync with .cargo/audit.toml (see comments there).
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195
