on: [push, pull_request]

name: CI

jobs:
  check:
    name: Rust project (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Format + clippy only need to run on one OS — they're platform-agnostic
      # and re-running them on three runners burns minutes for nothing.
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      # --workspace matters: the root manifest is both a package and the
      # workspace root, so without it cargo silently skips the e2e member.
      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run cargo check
        run: cargo check --workspace

      # Test failures are echoed as ::error:: annotations because job logs
      # need authentication to read, while check-run annotations are public —
      # this makes cross-platform failures diagnosable without a token.
      - name: Run unit tests
        shell: bash
        run: |
          cargo test --lib 2>&1 | tee test-out.txt
          status=${PIPESTATUS[0]}
          if [ "$status" != "0" ]; then
            grep -E "FAILED|panicked at|^error" test-out.txt | head -40 | while IFS= read -r line; do echo "::error::${line}"; done
          fi
          exit "$status"

      - name: Run integration tests
        shell: bash
        run: |
          cargo test --test integration_tests --test command_flows -- --test-threads=1 2>&1 | tee test-out.txt
          status=${PIPESTATUS[0]}
          if [ "$status" != "0" ]; then
            grep -E "FAILED|panicked at|^error" test-out.txt | head -40 | while IFS= read -r line; do echo "::error::${line}"; done
          fi
          exit "$status"

      - name: Run doc tests
        run: cargo test --doc

  network-tests:
    name: Network-dependent tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run ignored (network) tests
        run: cargo test --test integration_tests -- --ignored --test-threads=1

  security-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # audit-check reports its results by creating a check run, which the
    # default read-only GITHUB_TOKEN can't do ("Resource not accessible
    # by integration").
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep in sync with .cargo/audit.toml (see comments there).
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195
